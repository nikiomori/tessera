name: Feature request
description: Suggest a new capability, shape, encoder, or UI improvement.
title: "[feat] "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Start with the use case, not the implementation. "I'm trying to … but Tessera currently …"
      placeholder: |
        I want to print branded QR codes on stickers and need a CMYK-friendly export,
        but Tessera only emits sRGB PNG/SVG.
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: How might it work? An API field, a UI control, a new endpoint — sketch is fine.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other tools, workarounds, or approaches you tried.

  - type: dropdown
    id: scope
    attributes:
      label: Scope
      multiple: true
      options:
        - QR engine (encoders, shapes, colours, logo)
        - HTTP API
        - Web UI
        - Build / Docker / CI
        - Docs
